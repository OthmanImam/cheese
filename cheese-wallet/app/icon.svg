<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Dark rounded background -->
  <rect width="24" height="24" rx="5" fill="#0d0d0d"/>
  <!-- Cheese wedge fill (subtle warm dark) -->
  <path d="M2 20h20L12 3 2 20z" fill="#1a1400"/>
  <!-- Cheese wedge outline — same stroke as Navbar -->
  <path d="M2 20h20L12 3 2 20z" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Holes — solid gold so they read clearly at small sizes -->
  <circle cx="9.5" cy="15" r="1.25" fill="#C9A84C"/>
  <circle cx="14.5" cy="13.5" r="1" fill="#C9A84C"/>
  <circle cx="12" cy="18" r="0.875" fill="#C9A84C"/>
</svg>